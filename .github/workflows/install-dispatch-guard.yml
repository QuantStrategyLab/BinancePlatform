name: Install Dispatch Guard

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install:
    runs-on: self-hosted
    timeout-minutes: 5
    env:
      TG_TOKEN: ${{ secrets.TG_TOKEN }}
      GLOBAL_TELEGRAM_CHAT_ID: ${{ vars.GLOBAL_TELEGRAM_CHAT_ID }}
    steps:
      - name: Install guarded dispatch script
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TG_TOKEN:-}" ] || [ -z "${GLOBAL_TELEGRAM_CHAT_ID:-}" ]; then
            echo "TG_TOKEN and GLOBAL_TELEGRAM_CHAT_ID must be configured before installing dispatch guard." >&2
            exit 1
          fi

          ENV_FILE="$HOME/.config/binance-platform/dispatch.env"
          SCRIPT_PATH="$HOME/binance-quant/ops/dispatch-runtime.sh"
          mkdir -p "$(dirname "$ENV_FILE")" "$(dirname "$SCRIPT_PATH")"

          if [ -f "$SCRIPT_PATH" ]; then
            cp "$SCRIPT_PATH" "${SCRIPT_PATH}.bak.$(date -u +%Y%m%dT%H%M%SZ)"
          fi

          python3 - "$ENV_FILE" <<'PY'
          import os
          import shlex
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          updates = {
              "TG_TOKEN": os.environ["TG_TOKEN"],
              "GLOBAL_TELEGRAM_CHAT_ID": os.environ["GLOBAL_TELEGRAM_CHAT_ID"],
          }
          existing = path.read_text().splitlines() if path.exists() else []
          keys = set(updates)
          kept = [
              line
              for line in existing
              if not line.strip().split("=", 1)[0].removeprefix("export ").strip() in keys
          ]
          for key, value in updates.items():
              kept.append(f"{key}={shlex.quote(value)}")
          tmp = path.with_suffix(path.suffix + ".tmp")
          tmp.write_text("\n".join(kept) + "\n")
          tmp.chmod(0o600)
          tmp.replace(path)
          PY

          cat > "$SCRIPT_PATH" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          ENV_FILE="${BINANCE_PLATFORM_DISPATCH_ENV:-$HOME/.config/binance-platform/dispatch.env}"
          LOG_FILE="${BINANCE_PLATFORM_DISPATCH_LOG:-$HOME/binance-quant/ops/dispatch-runtime.log}"
          DISPATCH_MAX_ATTEMPTS="${DISPATCH_MAX_ATTEMPTS:-4}"
          DISPATCH_RETRY_BASE_SECONDS="${DISPATCH_RETRY_BASE_SECONDS:-15}"

          notify_telegram() {
            local message="$1"
            if [ -z "${TG_TOKEN:-}" ] || [ -z "${GLOBAL_TELEGRAM_CHAT_ID:-}" ]; then
              echo "Telegram dispatch notification skipped: target is not configured." >&2
              return 0
            fi
            curl --fail --silent --show-error \
              -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${GLOBAL_TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${message}" >/dev/null || \
              echo "Telegram dispatch notification failed." >&2
          }

          fail_dispatch() {
            local reason="$1"
            local details="${2:-}"
            local message
            message=$(printf '%s\n' \
              "Binance Runtime dispatch failed" \
              "host: $(hostname)" \
              "repo: ${REPO:-<unset>}" \
              "workflow: ${WORKFLOW:-<unset>}" \
              "ref: ${REF:-<unset>}" \
              "time_utc: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              "reason: ${reason}" \
              "${details}")
            notify_telegram "$message"
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) dispatch failed: ${reason} ${details}" >> "$LOG_FILE"
            exit 1
          }

          is_retryable_http_status() {
            case "$1" in
              000|500|502|503|504) return 0 ;;
              *) return 1 ;;
            esac
          }

          mkdir -p "$(dirname "$LOG_FILE")"

          [ -f "$ENV_FILE" ] || fail_dispatch "missing env file" "$ENV_FILE"
          # shellcheck disable=SC1090
          source "$ENV_FILE"

          for required in GITHUB_TOKEN REPO WORKFLOW REF; do
            if [ -z "${!required:-}" ]; then
              fail_dispatch "missing required env" "$required"
            fi
          done

          if ! [[ "$DISPATCH_MAX_ATTEMPTS" =~ ^[1-9][0-9]*$ ]]; then
            fail_dispatch "invalid DISPATCH_MAX_ATTEMPTS" "$DISPATCH_MAX_ATTEMPTS"
          fi
          if ! [[ "$DISPATCH_RETRY_BASE_SECONDS" =~ ^[0-9]+$ ]]; then
            fail_dispatch "invalid DISPATCH_RETRY_BASE_SECONDS" "$DISPATCH_RETRY_BASE_SECONDS"
          fi

          response_file=$(mktemp)
          stderr_file=$(mktemp)
          trap 'rm -f "$response_file" "$stderr_file"' EXIT

          attempt=1
          while [ "$attempt" -le "$DISPATCH_MAX_ATTEMPTS" ]; do
            : > "$response_file"
            : > "$stderr_file"

            set +e
            http_status=$(curl --silent --show-error \
              --connect-timeout 20 \
              --max-time 60 \
              --output "$response_file" \
              --write-out "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches" \
              -d "{\"ref\":\"${REF}\"}" 2>"$stderr_file")
            curl_exit=$?
            set -e

            if [ "$curl_exit" -eq 0 ] && [ "$http_status" = "204" ]; then
              echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) dispatched ${REPO}/${WORKFLOW} ref=${REF} attempt=${attempt}/${DISPATCH_MAX_ATTEMPTS}" >> "$LOG_FILE"
              exit 0
            fi

            retryable=false
            if [ "$curl_exit" -ne 0 ]; then
              reason="curl exited ${curl_exit}"
              details="$(head -c 800 "$stderr_file")"
              retryable=true
            else
              reason="GitHub dispatch returned HTTP ${http_status}"
              details="$(head -c 800 "$response_file")"
              if is_retryable_http_status "$http_status"; then
                retryable=true
              fi
            fi

            if [ "$attempt" -ge "$DISPATCH_MAX_ATTEMPTS" ] || [ "$retryable" != "true" ]; then
              fail_dispatch "$reason" "$details"
            fi

            delay=$((DISPATCH_RETRY_BASE_SECONDS * attempt))
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) dispatch retry ${attempt}/${DISPATCH_MAX_ATTEMPTS}: ${reason} ${details}" >> "$LOG_FILE"
            sleep "$delay"
            attempt=$((attempt + 1))
          done
          EOF

          chmod 700 "$SCRIPT_PATH"
          bash -n "$SCRIPT_PATH"
          echo "Installed guarded Binance dispatch script at $SCRIPT_PATH"
