name: Watchdog

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: binancequant
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/401309731911/locations/global/workloadIdentityPools/github-actions/providers/github-main
  GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: codex-gcp-operator@binancequant.iam.gserviceaccount.com

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install quant-platform-kit google-cloud-firestore
      - name: Run watchdog
        id: check
        run: |
          python -c "
          from quant_platform_kit.common.health import HealthMonitor
          alive, detail = HealthMonitor().check_alive()
          print(f'{alive and \"✅\" or \"❌\"} {detail}')
          exit(0 if alive else 1)
          "
