name: Watchdog

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  GCP_PROJECT_ID: binancequant
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/401309731911/locations/global/workloadIdentityPools/github-actions/providers/github-main
  GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: codex-gcp-operator@binancequant.iam.gserviceaccount.com

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}
      - name: Install deps
        run: pip install google-cloud-firestore quant-platform-kit
      - name: Check Firestore heartbeat
        id: check
        run: |
          python -c "
          from quant_platform_kit.common.health import FirestoreHeartbeat, is_heartbeat_fresh
          reader = FirestoreHeartbeat(collection='health', document='alive')
          hb = reader.read()
          if is_heartbeat_fresh(hb, max_age_seconds=600):
              print('✅ Alive')
              exit(0)
          else:
              print('❌ Dead or stale')
              exit(1)
          "
      - name: Alert on failure
        if: failure()
        run: |
          TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
          CHAT="${{ vars.GLOBAL_TELEGRAM_CHAT_ID }}"
          if [ -n "$TOKEN" ] && [ -n "$CHAT" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
              -d "chat_id=${CHAT}" \
              -d "text=🚨 Binance VPS health check FAILED — no recent heartbeat in Firestore"
          fi
